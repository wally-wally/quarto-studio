# Phase 4-A: 풀 컨테이너 스택 (postgres + migrate + web + worker)
name: quarto-studio

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quarto
      POSTGRES_PASSWORD: quarto
      POSTGRES_DB: quarto_studio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quarto -d quarto_studio"]
      interval: 5s
      timeout: 3s
      retries: 10

  # DB 마이그레이션 one-shot: postgres healthy 후 실행하고 종료.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: build
    command: node scripts/migrate.mjs
    environment:
      DATABASE_URL: postgres://quarto:quarto@postgres:5432/quarto_studio
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # 첨부 문서(docx/pptx/pdf) → 텍스트 변환 사이드카. 내부 네트워크 전용(외부 포트 미노출).
  convert:
    build:
      context: ./convert
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      DATABASE_URL: postgres://quarto:quarto@postgres:5432/quarto_studio
      ARTIFACT_DIR: /artifacts
      CONVERT_SERVICE_URL: http://convert:8000
    ports:
      - "3000:3000"
    volumes:
      - artifacts:/artifacts
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      convert:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgres://quarto:quarto@postgres:5432/quarto_studio
      ARTIFACT_DIR: /artifacts
      DAYTONA_API_KEY: ${DAYTONA_API_KEY:?DAYTONA_API_KEY가 필요합니다 (.env.local 참고)}
      DAYTONA_SNAPSHOT: ${DAYTONA_SNAPSHOT:-quarto-render-1}
    volumes:
      - artifacts:/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  artifacts:
